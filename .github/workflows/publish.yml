name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: node --check bin/sutils.js src/commands/monitor/index.js src/commands/monitor/start.js src/commands/monitor/monitor.js src/commands/monitor/shutdown.js src/commands/monitor/init.js

      - name: Smoke test CLI
        run: |
          node bin/sutils.js --help
          node bin/sutils.js monitor --help

  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        run: npm version ${GITHUB_REF_NAME#v} --no-git-tag-version --allow-same-version

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
